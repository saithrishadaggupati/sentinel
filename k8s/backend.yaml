apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-backend
  template:
    metadata:
      labels:
        app: sentinel-backend
    spec:
      containers:
        - name: backend
          image: sentinel-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-backend
spec:
  selector:
    app: sentinel-backend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
  type: NodePort
