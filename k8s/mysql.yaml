apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-mysql
  template:
    metadata:
      labels:
        app: sentinel-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--skip-host-cache", "--skip-name-resolve"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: "sentinel"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-mysql
spec:
  selector:
    app: sentinel-mysql
  ports:
    - port: 3306
      targetPort: 3306
