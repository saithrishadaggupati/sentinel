services:
  mysql:
    image: mysql:8.0
    container_name: sentinel-mysql
    command: --skip-host-cache --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sentinel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6380:6379"

  backend:
    build: .
    container_name: sentinel-backend
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - mysql
      - redis

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  mysql_data: